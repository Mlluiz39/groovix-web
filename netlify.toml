[build]
  command = "npm run build"
  publish = "dist"

# Proxy API calls to VPS backend (avoids mixed content)
[[redirects]]
  from = "/api/*"
  to = "http://162.250.121.168:8081/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
